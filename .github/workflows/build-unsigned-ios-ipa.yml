name: Build Unsigned iOS IPA
run-name: Ayna unsigned iOS build - ${{ github.event_name }} - ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-unsigned-ios-ipa.yml
      - scripts/build-unsigned-ios-ipa.sh
      - AynaMobile.xcodeproj/**
      - Sources/**
      - Package.swift
      - Package.resolved
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ayna-unsigned-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate workflow inputs
    runs-on: ubuntu-l